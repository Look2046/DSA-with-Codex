name: CI

on:
  push:
    branches: ["main", "feat/**", "docs/**"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run docs link check
        run: ./scripts/check-doc-links.sh

      - name: Run unit tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build
